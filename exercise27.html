<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Taiwan Attractions</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 30px;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            background-color: #f5f5f5;
        }

        .page {
            max-width: 1000px;
            margin: 0 auto;
            padding: 25px;
            background-color: #55b7f2;
        }

        .content-box {
            background-color: white;
            border-radius: 12px;
            padding: 18px;
        }

        .hero {
            background-color: #a8d93f;
            padding: 35px 20px;
            text-align: center;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .hero h1 {
            margin: 0;
            font-size: 28px;
            color: #2f2f2f;
        }

        .hero p {
            margin: 10px 0 0;
            font-size: 16px;
            color: #444;
        }

        .attraction-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 10px;
        }

        .attraction-card {
            background-color: #11bcc6;
            color: white;
            min-height: 160px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .attraction-card h2 {
            margin: 0 0 10px;
            font-size: 22px;
        }

        .attraction-card p {
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
        }

        .info-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .info-box {
            background-color: #e9eef0;
            min-height: 90px;
            padding: 14px;
            text-align: center;
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-box h3 {
            margin: 0 0 8px;
            font-size: 16px;
        }

        .info-box p {
            margin: 0;
            font-size: 13px;
            color: #555;
        }

        /* 當螢幕寬度小於或等於 480px 時，改變版面配置 */
        @media screen and (max-width: 480px) {
            body {
                padding: 15px;
            }

            .page {
                padding: 15px;
            }

            .content-box {
                padding: 12px;
            }

            .hero {
                padding: 28px 15px;
            }

            .hero h1 {
                font-size: 24px;
            }

            .attraction-list {
                grid-template-columns: 1fr;
            }

            .attraction-card {
                min-height: 80px;
            }

            .info-list {
                grid-template-columns: repeat(2, 1fr);
            }

            .info-box {
                min-height: 70px;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="content-box">

            <section class="hero">
                <h1>台灣景點推薦</h1>
                <p>探索台灣的自然風景、城市地標與特色文化</p>
            </section>

            <section class="attraction-list">
                <div class="attraction-card">
                    <h2>台北 101</h2>
                    <p>台灣最具代表性的城市地標，可以欣賞台北市景。</p>
                </div>

                <div class="attraction-card">
                    <h2>九份老街</h2>
                    <p>山城風景與懷舊街道，是體驗台灣文化的熱門景點。</p>
                </div>

                <div class="attraction-card">
                    <h2>日月潭</h2>
                    <p>湖光山色優美，適合騎單車、搭船與放鬆旅行。</p>
                </div>
            </section>

            <section class="info-list">
                <div class="info-box">
                    <h3>阿里山</h3>
                    <p>日出、雲海</p>
                </div>

                <div class="info-box">
                    <h3>太魯閣</h3>
                    <p>峽谷、步道</p>
                </div>

                <div class="info-box">
                    <h3>墾丁</h3>
                    <p>海灘、陽光</p>
                </div>

                <div class="info-box">
                    <h3>淡水</h3>
                    <p>夕陽、美食</p>
                </div>
            </section>

        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Image Styling</title>

    <style>
        body {
            margin: 0;
            padding: 60px;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
        }

        .image-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 0;
        }

        /* 左邊圖片：width 33%、height 300px、radius 18px、不變形 */
        .left-image {
            width: 33%;
            height: 300px;
            border-radius: 18px;
            object-fit: cover;
            object-position: center;
        }

        /* 中間圓形圖片：150px x 150px、有 border、不變形 */
        .circle-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center;
            border: 3px solid #333333;
            margin-top: 0;
            margin-left: -5px;
            margin-right: -5px;
            z-index: 2;
            background-color: white;
        }

        /* 右邊圖片：width 33%、height 300px、不變形 */
        .right-image {
            width: 33%;
            height: 300px;
            object-fit: cover;
            object-position: center;
        }
    </style>
</head>

<body>
    <div class="image-container">
        <img class="left-image"
            src="https://images.unsplash.com/photo-1503818454-2a008dc38d43?q=80&w=987&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt="Taipei101 Image" />

        <img class="circle-image"
            src="https://plus.unsplash.com/premium_photo-1661951189203-12decb9d7f8e?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt="Taipei101 Image" />

        <img class="right-image"
            src="https://images.unsplash.com/photo-1503818454-2a008dc38d43?q=80&w=3087&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt="Taipei101 Image" />
    </div>
</body>

</html>

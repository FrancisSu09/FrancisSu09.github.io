<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>JavaScript Object Properties</title>
</head>

<body>

    <h2>JavaScript Object Properties</h2>

    <h3>Original Object Properties:</h3>
    <p id="before"></p>

    <h3>After Deleting age Property:</h3>
    <p id="after"></p>

    <script>
        // Create an object
        var Person = {
            firstName: "Tony",
            lastName: "Lee",
            age: 50,
            eyeColor: "Blue"
        };

        // List all properties of the object
        var beforeText = "";
        for (var property in Person) {
            beforeText += property + " : " + Person[property] + "<br>";
        }

        // Display all properties before deleting age
        document.getElementById("before").innerHTML = beforeText;

        // Delete the age property
        delete Person.age;

        // Print the object after deleting the property
        var afterText = "";
        for (var property in Person) {
            afterText += property + " : " + Person[property] + "<br>";
        }

        // Display the object after deleting age
        document.getElementById("after").innerHTML = afterText;
    </script>

</body>

</html>

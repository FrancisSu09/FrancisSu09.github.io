<!DOCTYPE html>
<html>

<head>
    <title>Circle Calculator</title>
</head>

<body>
    <h1>Circle Calculator</h1>

    <label>Enter radius:</label>
    <input type="number" id="radius">
    <button onclick="calculateCircle()">Calculate</button>

    <p id="circumferenceResult"></p>
    <p id="areaResult"></p>

    <script>
        function calcCircumference(radius) {
            let circumference = 2 * Math.PI * radius;
            return "The circumference is " + circumference;
        }

        function calcArea(radius) {
            let area = Math.PI * radius * radius;
            return "The area is " + area;
        }

        function calculateCircle() {
            let radius = document.getElementById("radius").value;

            document.getElementById("circumferenceResult").innerHTML =
                calcCircumference(radius);

            document.getElementById("areaResult").innerHTML =
                calcArea(radius);
        }
    </script>
</body>

</html>
